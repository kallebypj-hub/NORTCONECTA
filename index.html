// MELHORIA 2 — Validação de CPF (algoritmo real)
// ══════════════════════════════════════════════════════════════
const validarCPF = (cpf) => {
  const c = cpf.replace(/\D/g,'');
  if (c.length !== 11 || /^(\d)\1+$/.test(c)) return false;
  const dig = (n) => {
    let s = 0;
    for (let i=0;i<n;i++) s += parseInt(c[i])*(n+1-i);
    const r = (s*10)%11;
    return r>=10 ? 0 : r;
  };
  return dig(9)===parseInt(c[9]) && dig(10)===parseInt(c[10]);
};

// ══════════════════════════════════════════════════════════════
// MELHORIA 3 — Validação de placa brasileira (antiga + Mercosul)
// ══════════════════════════════════════════════════════════════
const validarPlaca = (p) => {
  const s = p.replace(/[^A-Z0-9]/gi,'').toUpperCase();
  return /^[A-Z]{3}\d{4}$/.test(s) || /^[A-Z]{3}\d[A-Z]\d{2}$/.test(s);
};

const fmtCPF = (v) => {
  const d = v.replace(/\D/g,'').slice(0,11);
  if (d.length<=3) return d;
  if (d.length<=6) return `${d.slice(0,3)}.${d.slice(3)}`;
  if (d.length<=9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;
  return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
};
const fmtPlaca = (v) => v.replace(/[^A-Z0-9]/gi,'').toUpperCase().slice(0,7);

// Máscara telefone brasileiro: (00) 00000-0000
const fmtTel = (v) => {
  const d = v.replace(/\D/g,'').slice(0,11);
  if (d.length <= 2)  return `(${d}`;
  if (d.length <= 7)  return `(${d.slice(0,2)}) ${d.slice(2)}`;
  if (d.length <= 11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7,11)}`;
};

    const onPrompt = (e) => { e.preventDefault(); setInst(e); };

    window.addEventListener('appinstalled', onDone);
    return () => {
      window.removeEventListener('beforeinstallprompt', onPrompt);
      window.removeEventListener('appinstalled', onDone);
    };
  }, []);

    if (!installEvt) return;
    installEvt.prompt();
    const { outcome } = await installEvt.userChoice;
    if (outcome === 'accepted') setInstalled(true);
    setInst(null);

        setErr(`Você tem cadastro como ${PERFIL[u.perfil]}. Por favor selecione o tipo correto.`);

            Sua moto. Seu preço. Sem complicação.

        <div className="bg-white rounded-3xl shadow-2xl p-8 frenzzo-fade-up frenzzo-delay-1">

// MELHORIA 1 — Tela de Cadastro de Vendedor
// ══════════════════════════════════════════════════════════════
const RegisterPage = ({ onBack, onRegistered, googleData }) => {
  const viaGoogle  = !!googleData;
  const [tipo, setTipo] = useState(null); // null | 'comprador' | 'vendedor'
  const [f, setF]  = useState({
    nome: googleData?.nome||'', cpf:'', email: googleData?.email||'',
    senha: viaGoogle?'___GOOGLE___':'', tel:'', dataNasc:'', codConc:'',
  });
  const [marketing, setMarketing] = useState(true);
  const [erros, setErros] = useState({});
  const [ok, setOk] = useState('');
  const inp = (e) => `w-full border ${e?'border-red-400 bg-red-50':'border-gray-200'} rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#ff4500]`;

  const up = (k) => (e) => {
    let v = e.target.value;
    if (k==='cpf') v = fmtCPF(v);
    if (k==='tel') v = fmtTel(v);
    setF(p=>({...p,[k]:v}));
    setErros(p=>({...p,[k]:''}));
  };

  const validar = () => {
    const e = {};
    if (!f.nome.trim() || f.nome.trim().split(' ').length < 2) e.nome='Informe nome completo.';
    if (!validarCPF(f.cpf)) e.cpf='CPF inválido.';
    if (!f.email.includes('@')) e.email='E-mail inválido.';
    if (!viaGoogle && f.senha.length < 6) e.senha='Senha deve ter ao menos 6 caracteres.';
    if (!f.tel.replace(/\D/g,'') || f.tel.replace(/\D/g,'').length < 10) e.tel='Telefone inválido.';
    if (tipo==='comprador') {
      if (!f.dataNasc) e.dataNasc='Data de nascimento obrigatória.';
    } else {
      const concsLS = LS.getConcs()||[];
      const codigoOk = CONC_CODES[f.codConc.trim()] || concsLS.some(c=>c.codigo===f.codConc.trim()&&c.ativa);
      if (!codigoOk) e.codConc='Código inválido. Entre em contato com o administrador.';
    }
    setErros(e);
    return Object.keys(e).length===0;
  };

  const handle = (e) => {
    e.preventDefault();
    if (!validar()) return;
    const users = LS.getUsers()||[...DEMO_ACCOUNTS];
    if (users.find(u=>u.email.toLowerCase()===f.email.toLowerCase())) {
      setErros(p=>({...p,email:'E-mail já cadastrado.'})); return;
    }
    let perfil='comprador', conc=null, codConc='';
    if (tipo==='vendedor') {
      const code = f.codConc.trim();
      const ci   = CONC_CODES[code] || (()=>{
        const c=(LS.getConcs()||[]).find(c=>c.codigo===code&&c.ativa);
        return c?{perfil:'vendedor',nome:c.nome}:null;
      })();
      perfil=ci?.perfil||'vendedor'; conc=ci?.nome||null; codConc=code;
    }
    const novoUser = {
      id:Date.now(), nome:f.nome.trim(), cpf:f.cpf, email:f.email.toLowerCase(),
      senha:f.senha, tel:f.tel, codConc, perfil, conc,
      googleId:googleData?.googleId||null, marketing,
      dataNasc:f.dataNasc||null,
      dataCadastro:new Date().toISOString().split('T')[0],
      mustChangePassword:false,
    };
    LS.saveUsers([...users,novoUser]);
    setOk('Conta criada! Redirecionando...');
    setTimeout(()=>{ LS.saveSession(novoUser); onRegistered(novoUser); },1200);
  };

  // ── Tela 1: escolha do tipo ────────────────────────────────
  if (!tipo) return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={{background:'#0a0a0a'}}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-10 frenzzo-fade-up">
          <FrenzzoLogo size="lg" />
          <p className="mt-4 text-white text-lg font-bold">Crie sua conta</p>
          <p className="text-gray-500 text-sm mt-1">Qual é o seu perfil?</p>
        </div>
        <div className="space-y-4 frenzzo-fade-up frenzzo-delay-1">
          {[
            { t:'comprador', icon:'🛒', title:'Sou Comprador', desc:'Quero encontrar uma moto seminova com o melhor preço.' },
            { t:'vendedor',  icon:'🏪', title:'Sou Vendedor',  desc:'Trabalho em uma concessionária parceira FRENZZO.' },
          ].map(({t,icon,title,desc})=>(
            <button key={t} onClick={()=>setTipo(t)}
              className="w-full text-left p-5 rounded-2xl border-2 border-white/10 hover:border-[#ff4500] transition-all group"
              style={{background:'rgba(255,255,255,0.05)'}}>
              <div className="flex items-center gap-4">
                <div className="w-12 h-12 rounded-xl bg-[#ff4500]/20 flex items-center justify-center text-2xl group-hover:bg-[#ff4500]/30 transition-colors flex-shrink-0">
                  {icon}
                </div>
                <div>
                  <p className="font-bold text-white text-base">{title}</p>
                  <p className="text-gray-400 text-xs mt-0.5 leading-snug">{desc}</p>
                </div>
                <span className="ml-auto text-gray-600 group-hover:text-[#ff4500] text-xl transition-colors">›</span>
              </div>
            </button>
          ))}
        </div>
        <button onClick={onBack} className="w-full text-center text-gray-500 text-sm mt-6 hover:text-gray-300 transition-colors">
          ← Voltar ao login
        </button>
      </div>
    </div>
  );

  // ── Tela 2: formulário por tipo ───────────────────────────
  const tipoLabel = tipo==='comprador'?'Comprador':'Vendedor';
  const tipoIcon  = tipo==='comprador'?'🛒':'🏪';

  return (
    <div className="min-h-screen flex items-center justify-center p-4 overflow-y-auto" style={{background:'#0a0a0a'}}>
      <div className="w-full max-w-sm py-6">
        <div className="text-center mb-6 frenzzo-fade-up"><FrenzzoLogo size="lg" /></div>
        <div className="bg-white rounded-3xl shadow-2xl p-7">
          <div className="flex items-center gap-3 mb-5">
            <button onClick={()=>setTipo(null)} className="text-gray-400 hover:text-gray-600 text-xl leading-none">←</button>
            <div className="flex items-center gap-2">
              <span>{tipoIcon}</span>
              <h2 className="text-lg font-bold text-[#0a0a0a]">{tipoLabel} — Criar conta</h2>
            </div>
          </div>

          {viaGoogle && (
            <div className="mb-4 flex items-center gap-2 bg-blue-50 border border-blue-100 rounded-xl px-4 py-3 text-sm text-blue-700">
              <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
              Google detectado. Complete os campos obrigatórios.
            </div>
          )}
          {ok && <div className="mb-4 bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm rounded-xl px-4 py-3">{ok}</div>}

          <form onSubmit={handle} className="space-y-3">
            {/* Nome */}
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Nome completo *</label>
              <input className={inp(erros.nome)} placeholder="João da Silva" value={f.nome} onChange={up('nome')} />
              {erros.nome && <p className="text-red-500 text-xs mt-1">{erros.nome}</p>}
            </div>
            {/* CPF — sempre manual */}
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">CPF *</label>
              <input className={inp(erros.cpf)} placeholder="000.000.000-00" value={f.cpf} onChange={up('cpf')} inputMode="numeric" />
              {erros.cpf && <p className="text-red-500 text-xs mt-1">{erros.cpf}</p>}
              {f.cpf.length===14 && validarCPF(f.cpf) && <p className="text-emerald-600 text-xs mt-1">✓ CPF válido</p>}
            </div>
            {/* E-mail */}
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">E-mail *</label>
              <input className={inp(erros.email)} type="email" placeholder="seu@email.com"
                value={f.email} onChange={up('email')} readOnly={viaGoogle} />
              {erros.email && <p className="text-red-500 text-xs mt-1">{erros.email}</p>}
            </div>
            {/* Senha */}
            {!viaGoogle && (
              <div>
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Senha *</label>
                <input className={inp(erros.senha)} type="password" placeholder="Mín. 6 caracteres" value={f.senha} onChange={up('senha')} />
                {erros.senha && <p className="text-red-500 text-xs mt-1">{erros.senha}</p>}
              </div>
            )}
            {/* Telefone — sempre manual, com máscara */}
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Telefone / WhatsApp *</label>
              <input className={inp(erros.tel)} placeholder="(00) 00000-0000" value={f.tel} onChange={up('tel')} inputMode="numeric" />
              {erros.tel && <p className="text-red-500 text-xs mt-1">{erros.tel}</p>}
            </div>
            {/* Campos específicos por tipo */}
            {tipo==='comprador' && (
              <div>

            )}
            {tipo==='vendedor' && (
              <div>
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Código da Concessionária *</label>
                <input className={inp(erros.codConc)} placeholder="Ex: 1614410" value={f.codConc} onChange={up('codConc')} inputMode="numeric" />
                {erros.codConc
                  ? <p className="text-red-500 text-xs mt-1">{erros.codConc}</p>
                  : <p className="text-gray-400 text-xs mt-1">Solicite o código ao gerente da sua loja.</p>}

            {/* Marketing */}
            <label className="flex items-start gap-3 cursor-pointer pt-1">
              <input type="checkbox" checked={marketing} onChange={e=>setMarketing(e.target.checked)}

              <span className="text-sm text-gray-600 leading-snug">Quero receber ofertas e novidades do FRENZZO</span>
            </label>
            <button type="submit" className="w-full bg-[#ff4500] text-white py-3.5 rounded-2xl font-bold hover:bg-[#e03d00] transition-colors mt-1">
              Criar Conta
            </button>
          </form>
        </div>
      </div>
    </div>
  );
};

// MELHORIA 4 — Upload de fotos obrigatórias (4 ângulos)
// ══════════════════════════════════════════════════════════════
const FOTO_LABELS = ['Frente','Traseira','Lateral Esquerda','Lateral Direita'];

const PhotoSlot = ({ label, foto, onSelect, required }) => {
  const ref = useRef();
  return (
    <div>
      <p className="text-xs font-semibold text-gray-600 mb-1.5 flex items-center gap-1">
        {label} {required && !foto && <span className="text-red-500">*</span>}
        {foto && <span className="text-emerald-600">✓</span>}
      </p>
      {foto ? (
        <div className="relative group">
          <img src={foto} alt={label} className="w-full h-28 object-cover rounded-xl border border-gray-200" />
          <button type="button" onClick={()=>onSelect(null)}
            className="absolute top-1.5 right-1.5 bg-red-500 text-white rounded-full w-6 h-6 text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow">✕</button>
        </div>
      ) : (
        <div onClick={()=>ref.current.click()}
          className="w-full h-28 border-2 border-dashed border-gray-200 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-[#ff4500] hover:bg-orange-50 transition-colors">
          <span className="text-2xl mb-1">📷</span>
          <span className="text-xs text-gray-400">Toque para adicionar</span>
        </div>
      )}
      <input ref={ref} type="file" accept="image/*" className="hidden" onChange={e=>{
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          // Comprime para max 800px e qualidade 0.75 antes de salvar
          const img = new Image();
          img.onload = () => {
            const MAX = 800;
            const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
            const canvas = document.createElement('canvas');
            canvas.width  = Math.round(img.width  * ratio);
            canvas.height = Math.round(img.height * ratio);
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            onSelect(canvas.toDataURL('image/jpeg', 0.75));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value='';
      }} />
    </div>
  );
};

// MELHORIA 6 — Hook FIPE (API pública Parallelum)
// ══════════════════════════════════════════════════════════════
const FIPE_BASE = 'https://parallelum.com.br/fipe/api/v1/motos';

const useFIPE = () => {
  const [marcas,   setMarcas]   = useState([]);
  const [modelos,  setModelos]  = useState([]);
  const [anos,     setAnos]     = useState([]);
  const [fipeRes,  setFipeRes]  = useState(null);
  const [fipeErr,  setFipeErr]  = useState('');
  const [loading,  setLoading]  = useState(false);
  const [mCod,setMCod] = useState('');
  const [mdCod,setMdCod] = useState('');
  const [aCod,setACod] = useState('');

  useEffect(() => {
    setLoading(true);
    fetch(`${FIPE_BASE}/marcas`)
      .then(r=>r.json()).then(d=>{setMarcas(d||[]);setLoading(false);})
      .catch(()=>{setFipeErr('FIPE indisponível — validação de preço desabilitada.');setLoading(false);});
  }, []);

  useEffect(() => {
    if (!mCod) { setModelos([]); setMdCod(''); return; }
    setLoading(true);
    fetch(`${FIPE_BASE}/marcas/${mCod}/modelos`)
      .then(r=>r.json()).then(d=>{setModelos(d?.modelos||[]);setLoading(false);})
      .catch(()=>setLoading(false));
  }, [mCod]);

  useEffect(() => {
    if (!mCod||!mdCod) { setAnos([]); setACod(''); return; }
    setLoading(true);
    fetch(`${FIPE_BASE}/marcas/${mCod}/modelos/${mdCod}/anos`)
      .then(r=>r.json()).then(d=>{setAnos(d||[]);setLoading(false);})
      .catch(()=>setLoading(false));
  }, [mCod, mdCod]);

  useEffect(() => {
    if (!mCod||!mdCod||!aCod) { setFipeRes(null); return; }
    setLoading(true);
    fetch(`${FIPE_BASE}/marcas/${mCod}/modelos/${mdCod}/anos/${aCod}`)
      .then(r=>r.json()).then(d=>{
        const num = parseFloat((d.Valor||'0').replace('R$ ','').replace(/\./g,'').replace(',','.'));
        setFipeRes({ valor: num, label: d.Valor, modelo: d.Modelo, marca: d.Marca, ano: d.AnoModelo });
        setLoading(false);
      }).catch(()=>setLoading(false));
  }, [mCod, mdCod, aCod]);

  return { marcas, modelos, anos, fipeRes, fipeErr, loading, mCod, setMCod, mdCod, setMdCod, aCod, setACod };
};

// ── Assinatura digital ─────────────────────────────────────────
const SigPad = ({ onSign }) => {
  const ref = useRef(); const drawing = useRef(false); const [signed,setSigned] = useState(false);
  const pos = (e) => { const r=ref.current.getBoundingClientRect(); const s=e.touches?e.touches[0]:e; return [s.clientX-r.left,s.clientY-r.top]; };
  const start = (e) => { drawing.current=true; const ctx=ref.current.getContext('2d'); ctx.beginPath(); const [x,y]=pos(e); ctx.moveTo(x,y); };
  const move  = (e) => { if(!drawing.current)return; e.preventDefault(); const ctx=ref.current.getContext('2d'); ctx.lineWidth=2;ctx.lineCap='round';ctx.strokeStyle='#0a0a0a'; const [x,y]=pos(e); ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y); setSigned(true);onSign(true); };
  const stop  = () => { drawing.current=false; };
  const clear = () => { ref.current.getContext('2d').clearRect(0,0,500,120); setSigned(false); onSign(false); };
  return (
    <div>
      <p className="text-sm font-medium text-gray-700 mb-1">Assine abaixo:</p>
      <canvas ref={ref} width={500} height={120} className="sig-pad border-2 border-dashed border-gray-300 rounded-xl w-full bg-gray-50"
        onMouseDown={start} onMouseMove={move} onMouseUp={stop} onMouseLeave={stop}
        onTouchStart={start} onTouchMove={move} onTouchEnd={stop} />
      <button type="button" onClick={clear} className="text-xs text-gray-400 hover:text-gray-600 mt-1">Limpar</button>
    </div>
  );
};

const Cadastro = ({ user, onSave }) => {
  // Proprietário
  const [pNome,setPNome] = useState('');
  const [pCpf,setPCpf]  = useState('');
  const [pFone,setPFone] = useState('');
  const [pCpfErr,setPCpfErr] = useState('');

  // Veículo
  const [placa,setPlaca]     = useState('');
  const [renavam,setRenavam] = useState('');
  const [km,setKm]           = useState('');
  const [placaErr,setPlacaErr] = useState('');

  // Conservação
  const [obs,setObs] = useState('');
  const [laudo,setLaudo] = useState({ pneus:'', relacao:'', pintura:'', motor:'' });

  // Fotos (4 slots obrigatórios)
  const [fotos,setFotos] = useState([null,null,null,null]);

  // Preço
  const [pd,setPd] = useState('');

  // Erros gerais
  const [erros,setErros] = useState({});

  // Ano (select estático 2026→2000)
  const [ano, setAno] = useState('');
  const ANOS = Array.from({length:27},(_,i)=>2026-i); // [2026..2000]

  // FIPE
  const fipe = useFIPE();
  const [fipeAviso,setFipeAviso] = useState('');

  // Auto-seleciona Honda quando as marcas carregam
  useEffect(() => {
    if (fipe.marcas.length > 0 && !fipe.mCod) {
      const honda = fipe.marcas.find(m => m.nome.toUpperCase().includes('HONDA'));
      if (honda) fipe.setMCod(honda.codigo);
    }
  }, [fipe.marcas]);

  // Quando ano muda, tenta casar com o código FIPE para consulta de preço
  useEffect(() => {
    if (!ano || !fipe.anos.length) { fipe.setACod(''); return; }
    const match = fipe.anos.find(a => a.nome.startsWith(String(ano)));
    fipe.setACod(match ? match.codigo : '');
  }, [ano, fipe.anos]);

  const setFoto = (idx,val) => setFotos(p=>{ const n=[...p]; n[idx]=val; return n; });
  const setLaudoItem = (k,v) => setLaudo(p=>({...p,[k]:v}));

  // Placa: formata e valida em tempo real
  const handlePlaca = (e) => {
    const v = fmtPlaca(e.target.value);
    setPlaca(v);
    if (v.length>=7) setPlacaErr(validarPlaca(v)?'':'Formato inválido. Use ABC1234 (antiga) ou ABC1D23 (Mercosul).');
    else setPlacaErr('');
  };

  // CPF proprietário: valida em tempo real
  const handleCpf = (e) => {
    const v = fmtCPF(e.target.value);
    setPCpf(v);
    if (v.length===14) setPCpfErr(validarCPF(v)?'':'CPF inválido.');
    else setPCpfErr('');
  };

  // ── Nova regra: preço final nunca pode atingir (FIPE − R$500) ──
  const pdNum = parseFloat(pd) || 0;
  const fipeVal    = fipe.fipeRes?.valor || 0;
  // pd_max: maior valor que o dono pode pedir sem estourar o limite
  // pd*1.11 + 200 < FIPE − 500  →  pd < (FIPE − 700)/1.11
  const pdMax      = fipeVal > 700 ? Math.floor(((fipeVal - 700) / 1.11) * 100) / 100 : 0;
  const limitePrecoFinal = fipeVal - 500;                     // teto do preço ao comprador
  const precoFinalAtual  = pdNum > 0 ? pdNum * 1.11 + 200 : 0;
  const fipeExcede = fipe.fipeRes && pdNum > 0 && precoFinalAtual >= limitePrecoFinal;

  const inp = (err) => `w-full border ${err?'border-red-400 bg-red-50':'border-gray-200'} rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-[#ff4500]`;
  const sel = "w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-[#ff4500] bg-white";

  const validar = () => {
    const e = {};
    if (!pNome.trim()) e.pNome='Nome obrigatório.';
    if (!validarCPF(pCpf)) e.pCpf='CPF inválido.';
    if (!pFone.trim()) e.pFone='Telefone obrigatório.';
    if (!validarPlaca(placa)) e.placa='Placa inválida.';
    if (!renavam.trim()) e.renavam='Renavam obrigatório.';
    if (!km) e.km='KM obrigatório.';

    // Melhoria 5: laudo
    const laudoIncompleto = LAUDO_ITEMS.some(i=>!laudo[i.key]);
    if (laudoIncompleto) e.laudo='Preencha todos os itens do laudo.';
    const laudoAtencao = LAUDO_ITEMS.filter(i=>laudo[i.key]==='Requer Atenção').map(i=>i.label);
    if (laudoAtencao.length>0) e.laudoAtencao=`Item(ns) com atenção necessária: ${laudoAtencao.join(', ')}. Resolva antes de cadastrar.`;

    // Melhoria 4: fotos
    const fotosFaltando = fotos.map((f,i)=>!f?FOTO_LABELS[i]:null).filter(Boolean);
    if (fotosFaltando.length>0) e.fotos=`Fotos obrigatórias faltando: ${fotosFaltando.join(', ')}.`;

    if (!ano) e.ano='Selecione o ano do veículo.';
    if (!pd || pdNum<=0) e.pd='Informe o valor desejado.';
    if (fipeExcede) e.pd=`O preço final ficaria acima do limite permitido. O valor máximo que você pode receber é ${R(pdMax)} para manter o veículo competitivo no mercado.`;

    setErros(e);
    return Object.keys(e).length===0;
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!validar()) { window.scrollTo({top:0,behavior:'smooth'}); return; }
    const modeloLabel = fipe.modelos.find(m=>m.codigo===fipe.mdCod)?.nome || '—';
    onSave({
      id: Date.now(),
      prop:{ nome:pNome, cpf:pCpf, fone:pFone },
      vei:{ marca:'Honda', modelo:modeloLabel, ano:parseInt(ano)||new Date().getFullYear(), placa, renavam, km:parseInt(km) },
      obs, laudo, fotos, pd:pdNum, ...calc(pdNum),
      status:'disponivel', capId:user.id, cap:user.nome,
      vendId:null, vend:null, comprador:null, conc:user.conc, data:new Date().toISOString().split('T')[0],
    });
  };

  const allFotos = fotos.every(Boolean);
  const laudoOk  = LAUDO_ITEMS.every(i=>laudo[i.key]);

  return (
    <div className="max-w-2xl">
      <div className="mb-6"><h1 className="text-2xl font-bold text-[#0a0a0a]">Cadastrar Moto</h1><p className="text-gray-400 text-sm">Todos os campos marcados com * são obrigatórios</p></div>

      {/* Erros no topo */}
      {Object.keys(erros).length>0 && (
        <div className="mb-5 bg-red-50 border border-red-200 rounded-2xl p-4">
          <p className="font-bold text-red-700 text-sm mb-2">Corrija os seguintes erros:</p>
          <ul className="space-y-1">{Object.values(erros).map((e,i)=><li key={i} className="text-red-600 text-xs">• {e}</li>)}</ul>
        </div>
      )}

      <form onSubmit={handleSubmit} className="space-y-5">
        {/* Proprietário */}
        <Card title="Dados do Proprietário">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div className="sm:col-span-2">
              <input className={inp(erros.pNome)} placeholder="Nome completo *" value={pNome} onChange={e=>setPNome(e.target.value)} />
              {erros.pNome && <p className="text-red-500 text-xs mt-1">{erros.pNome}</p>}
            </div>
            <div>
              <input className={inp(erros.pCpf||pCpfErr)} placeholder="CPF * (000.000.000-00)" value={pCpf} onChange={handleCpf} />
              {(erros.pCpf||pCpfErr) && <p className="text-red-500 text-xs mt-1">{erros.pCpf||pCpfErr}</p>}
              {pCpf.length===14 && validarCPF(pCpf) && <p className="text-emerald-600 text-xs mt-1">✓ CPF válido</p>}
            </div>
            <div>
              <input className={inp(erros.pFone)} placeholder="(00) 00000-0000" inputMode="numeric"
                value={pFone} onChange={e=>setPFone(fmtTel(e.target.value))} />
              {erros.pFone && <p className="text-red-500 text-xs mt-1">{erros.pFone}</p>}
            </div>
          </div>
        </Card>

        {/* Veículo — Marca/Modelo/Ano via FIPE */}
        <Card title="Dados do Veículo"
          badge={fipe.fipeErr ? <span className="text-xs text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full">FIPE offline</span> : fipe.loading ? <span className="text-xs text-blue-500">Carregando FIPE…</span> : null}>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
            {/* Marca: apenas Honda */}
            <div>
              <label className="text-xs text-gray-500 font-medium">Marca *</label>
              <div className={`${sel} flex items-center gap-2 bg-slate-50 text-gray-700 font-semibold cursor-not-allowed`}>
                <span>🏍️</span> Honda
              </div>
            </div>
            {/* Modelo via FIPE (Honda) */}
            <div>
              <label className="text-xs text-gray-500 font-medium">Modelo *</label>
              <select className={sel} value={fipe.mdCod} onChange={e=>fipe.setMdCod(e.target.value)}
                disabled={!fipe.mCod || fipe.modelos.length===0}>
                <option value="">{fipe.mCod?'Selecione…':'Aguardando FIPE…'}</option>
                {fipe.modelos.map(m=><option key={m.codigo} value={m.codigo}>{m.nome}</option>)}
              </select>
            </div>
            {/* Ano: select estático 2026→2000 */}
            <div>
              <label className="text-xs text-gray-500 font-medium">Ano *</label>
              <select className={`${sel} ${erros.ano?'border-red-400':''}`}
                value={ano} onChange={e=>setAno(e.target.value)}>
                <option value="">Selecione…</option>
                {ANOS.map(a=><option key={a} value={a}>{a}</option>)}
              </select>
              {erros.ano && <p className="text-red-500 text-xs mt-1">{erros.ano}</p>}
            </div>
          </div>

          {/* Preço FIPE consultado */}
          {fipe.fipeRes && (
            <div className="mb-3 bg-blue-50 border border-blue-100 rounded-xl px-4 py-3 text-sm">
              <p className="font-bold text-[#0a0a0a]">Tabela FIPE: <span className="text-[#ff4500]">{fipe.fipeRes.label}</span></p>
              <p className="text-gray-500 text-xs">{fipe.fipeRes.marca} {fipe.fipeRes.modelo} — {fipe.fipeRes.ano}</p>
            </div>
          )}

          <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
            <div>
              <label className="text-xs text-gray-500 font-medium">Placa *</label>
              <input className={inp(erros.placa||placaErr)} placeholder="ABC1234" value={placa} onChange={handlePlaca} maxLength={7} />
              {(erros.placa||placaErr) && <p className="text-red-500 text-xs mt-1">{erros.placa||placaErr}</p>}
              {placa.length>=7 && validarPlaca(placa) && <p className="text-emerald-600 text-xs mt-1">✓ Placa válida</p>}
            </div>
            <div>
              <label className="text-xs text-gray-500 font-medium">Renavam *</label>
              <input className={inp(erros.renavam)} placeholder="00000000000" value={renavam} onChange={e=>setRenavam(e.target.value)} />
            </div>
            <div>
              <label className="text-xs text-gray-500 font-medium">KM atual *</label>
              <input className={inp(erros.km)} type="number" placeholder="0" value={km} onChange={e=>setKm(e.target.value)} />
            </div>
          </div>
        </Card>

        {/* Fotos obrigatórias — MELHORIA 4 */}
        <Card title="Fotos do Veículo"
          badge={allFotos
            ? <span className="text-xs text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">✓ Todas enviadas</span>
            : <span className="text-xs text-red-500 bg-red-50 px-2 py-0.5 rounded-full">{fotos.filter(Boolean).length}/4 obrigatórias</span>}>
          {erros.fotos && <p className="text-red-500 text-sm mb-3 bg-red-50 rounded-xl px-3 py-2">{erros.fotos}</p>}
          <div className="grid grid-cols-2 gap-3">
            {FOTO_LABELS.map((label,i) => (
              <PhotoSlot key={i} label={label} foto={fotos[i]} onSelect={v=>setFoto(i,v)} required />
            ))}
          </div>
        </Card>

        {/* Laudo — MELHORIA 5 */}
        <Card title="Laudo de Conservação"
          badge={laudoOk
            ? <span className="text-xs text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">✓ Completo</span>
            : <span className="text-xs text-red-500 bg-red-50 px-2 py-0.5 rounded-full">Preencha todos</span>}>
          <LaudoForm laudo={laudo} onChange={setLaudoItem} />
          {erros.laudo && <p className="text-red-500 text-sm mt-3 bg-red-50 rounded-xl px-3 py-2">{erros.laudo}</p>}
          {erros.laudoAtencao && <p className="text-amber-700 text-sm mt-2 bg-amber-50 rounded-xl px-3 py-2">⚠️ {erros.laudoAtencao}</p>}
          <div className="mt-3">
            <label className="text-xs text-gray-500 font-medium">Observações adicionais</label>
            <textarea className="w-full mt-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm h-20 resize-none focus:outline-none focus:border-[#ff4500]" placeholder="Descreva o estado geral..." value={obs} onChange={e=>setObs(e.target.value)} />
          </div>
        </Card>

        {/* Precificação + FIPE — MELHORIA 6 */}
        <Card title="Precificação">
          <label className="text-sm text-gray-500 mb-1 block">Valor desejado pelo proprietário (R$) *</label>
          <input className={`${inp(erros.pd || fipeExcede)} text-xl font-bold`} placeholder="0,00"
            type="number" step="0.01" value={pd} onChange={e=>setPd(e.target.value)} />

          {/* Indicador em tempo real */}
          {fipe.fipeRes && pdNum > 0 && (
            fipeExcede ? (
              <div className="mt-2 bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm space-y-1.5">
                <p className="font-bold text-red-700">✗ Valor acima do limite</p>
                <p className="text-red-600 leading-snug">
                  O preço final ao comprador seria <strong>{R(precoFinalAtual)}</strong>, igual ou acima do teto permitido de <strong>{R(limitePrecoFinal)}</strong> (FIPE − R$500).
                </p>
                <p className="text-red-600 font-medium leading-snug">
                  Ajuste para <strong>{R(pdMax)}</strong> ou menos.
                </p>
                <button type="button" onClick={() => setPd(String(pdMax))}
                  className="mt-1 text-xs bg-red-600 text-white px-3 py-1.5 rounded-lg hover:bg-red-700 font-semibold">
                  Usar valor máximo ({R(pdMax)})
                </button>
              </div>
            ) : (
              <p className="text-emerald-600 text-xs mt-2 font-medium">
                ✓ Dentro do limite competitivo — preço final ao comprador: {R(precoFinalAtual)} &lt; {R(limitePrecoFinal)}
              </p>
            )
          )}

          {/* Teto informativo quando FIPE disponível mas pd ainda vazio */}
          {fipe.fipeRes && !pdNum && (
            <p className="text-gray-400 text-xs mt-2">
              Limite: proprietário pode receber até <strong className="text-gray-500">{R(pdMax)}</strong> (preço final ≤ {R(limitePrecoFinal)})
            </p>
          )}

          {erros.pd && !fipeExcede && <p className="text-red-500 text-xs mt-1">{erros.pd}</p>}

          {pdNum > 0 && !fipeExcede && <div className="mt-4"><Breakdown pd={pdNum} /></div>}
        </Card>

        <button type="submit"
          className="w-full bg-[#ff4500] text-white py-4 rounded-2xl font-bold text-base hover:bg-[#e03d00] transition-colors shadow-lg">
          Cadastrar Moto
        </button>
      </form>
    </div>
  );
};

// ── COMISSÕES ──────────────────────────────────────────────────
const Comissoes = ({ motos, user }) => {
  const rows = [];
  motos.forEach(m=>{
    const all = user.perfil!=='vendedor';
    if (all||m.capId===user.id) rows.push({id:`c${m.id}`,moto:`${m.vei.marca} ${m.vei.modelo} ${m.vei.ano}`,tipo:'Captação',valor:m.bonus,paga:m.status==='concluido',vendedor:m.cap,data:m.data});
    if (m.vendId&&(all||m.vendId===user.id)) rows.push({id:`v${m.id}`,moto:`${m.vei.marca} ${m.vei.modelo} ${m.vei.ano}`,tipo:'Venda 1%',valor:m.comissaoVenda,paga:m.status==='concluido',vendedor:m.vend,data:m.data});
  });
  const tot=rows.reduce((s,r)=>s+r.valor,0), pago=rows.filter(r=>r.paga).reduce((s,r)=>s+r.valor,0), pend=tot-pago;
  return (
    <div>
      <div className="mb-6"><h1 className="text-2xl font-bold text-[#0a0a0a]">Comissões</h1><p className="text-gray-400 text-sm">{user.perfil==='vendedor'?'Suas comissões':'Comissões da equipe'}</p></div>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        {[['Total Acumulado',R(tot),'text-[#0a0a0a]'],['Pendentes',R(pend),'text-amber-600'],['Pagas',R(pago),'text-emerald-600']].map(([l,v,c])=>(
          <div key={l} className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100"><p className="text-sm text-gray-400">{l}</p><p className={`text-2xl font-bold ${c}`}>{v}</p></div>
        ))}
      </div>
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div className="overflow-x-auto"><table className="w-full text-sm">
          <thead className="bg-slate-50"><tr>
            {user.perfil!=='vendedor'&&<th className="text-left px-4 py-3 text-gray-400 font-medium">Vendedor</th>}
            <th className="text-left px-4 py-3 text-gray-400 font-medium">Veículo</th>
            <th className="text-left px-4 py-3 text-gray-400 font-medium">Tipo</th>
            <th className="text-right px-4 py-3 text-gray-400 font-medium">Valor</th>
            <th className="text-center px-4 py-3 text-gray-400 font-medium">Status</th>
          </tr></thead>
          <tbody>{rows.map(r=>(
            <tr key={r.id} className="border-t border-slate-50 hover:bg-slate-50/50">
              {user.perfil!=='vendedor'&&<td className="px-4 py-3 text-gray-700">{r.vendedor}</td>}
              <td className="px-4 py-3 text-gray-700 font-medium">{r.moto}</td>
              <td className="px-4 py-3 text-gray-400">{r.tipo}</td>
              <td className="px-4 py-3 text-right font-bold text-[#0a0a0a]">{R(r.valor)}</td>
              <td className="px-4 py-3 text-center">
                <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${r.paga?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}`}>{r.paga?'Paga':'Pendente'}</span>
              </td>
            </tr>
          ))}</tbody>
        </table></div>
      </div>
    </div>
  );
};

          <tfoot className="bg-slate-50 border-t-2 border-slate-200"><tr>

          <p className="text-blue-300 text-sm mt-1">Vencimento: 31/01/2024</p>

  );
};

// ── CONCESSIONÁRIAS ────────────────────────────────────────────

};

const AlterarSenhaModal = ({ user, onClose, onSaved }) => {
  const [atual,setAtual]   = useState('');
  const [nova,setNova]     = useState('');
  const [conf,setConf]     = useState('');
  const [err,setErr]       = useState('');
  const inp = (e) => `w-full border ${e?'border-red-400 bg-red-50':'border-gray-200'} rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#ff4500]`;
  const handle = () => {
    if (atual !== user.senha) { setErr('Senha atual incorreta.'); return; }
    if (nova.length < 6)       { setErr('Nova senha deve ter ao menos 6 caracteres.'); return; }
    if (nova !== conf)          { setErr('As senhas não coincidem.'); return; }
    const updated = { ...user, senha: nova, mustChangePassword: false };
    LS.saveUsers((LS.getUsers()||[]).map(u => u.id===user.id ? updated : u));
    LS.saveSession(updated);
    onSaved(updated);
    onClose();
  };
  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl" onClick={e=>e.stopPropagation()}>
        <h3 className="font-bold text-[#0a0a0a] text-lg mb-5">Alterar Senha</h3>
        <div className="space-y-3">
          <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Senha atual</label>
            <input className={inp(false)} type="password" placeholder="••••••••" value={atual} onChange={e=>setAtual(e.target.value)} /></div>
          <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Nova senha</label>
            <input className={inp(false)} type="password" placeholder="••••••••" value={nova} onChange={e=>setNova(e.target.value)} /></div>
          <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Confirmar nova senha</label>
            <input className={inp(false)} type="password" placeholder="••••••••" value={conf} onChange={e=>setConf(e.target.value)} /></div>

      </div>

  );
};

const PerfilPage = ({ user, onUpdate, onLogout }) => {

  const [nome,setNome]       = useState(user.nome);

  const handleFoto = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX=200; const r=Math.min(MAX/img.width,MAX/img.height,1);
        const c=document.createElement('canvas'); c.width=Math.round(img.width*r); c.height=Math.round(img.height*r);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        setFoto(c.toDataURL('image/jpeg',0.8));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const saveProfile = () => {
    const updated = { ...user, nome:nome.trim(), tel, dataNasc, foto };
    LS.saveUsers((LS.getUsers()||[]).map(u => u.id===user.id ? updated : u));
    LS.saveSession(updated);
    onUpdate(updated);
    setEditing(false);
    setSaved(true);

        <div className="flex items-center gap-5">
          <div className="relative">
            <div className="w-20 h-20 rounded-full overflow-hidden bg-[#ff4500] flex items-center justify-center">
              {foto ? <img src={foto} className="w-full h-full object-cover" alt="Foto" />
                     : <span className="text-white font-black text-3xl">{nome[0]}</span>}
            </div>
            <button onClick={()=>fotoRef.current.click()}
              className="absolute -bottom-1 -right-1 w-7 h-7 bg-[#ff4500] rounded-full flex items-center justify-center shadow text-white text-xs hover:bg-[#e03d00]">✏️</button>
            <input ref={fotoRef} type="file" accept="image/*" className="hidden" onChange={handleFoto} />
          </div>
          <div className="flex-1">
            {editing
              ? <input className={inp} value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome completo" />
              : <p className="text-xl font-bold text-[#0a0a0a]">{nome}</p>}
            <p className="text-sm text-gray-400 mt-0.5">{PERFIL[user.perfil]}{user.conc&&` • ${user.conc}`}</p>
          </div>
        </div>
      </div>

      {/* Dados editáveis */}
      <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-4 space-y-4">
        <div className="flex justify-between items-center mb-1">
          <p className="font-bold text-[#0a0a0a]">Dados Pessoais</p>
          {!editing
            ? <button onClick={()=>setEditing(true)} className="text-[#ff4500] text-sm font-semibold hover:underline">Editar</button>
            : <div className="flex gap-2">
                <button onClick={()=>setEditing(false)} className="text-gray-400 text-sm hover:text-gray-600">Cancelar</button>
                <button onClick={saveProfile} className="bg-[#ff4500] text-white px-3 py-1 rounded-lg text-sm font-semibold">Salvar</button>

        {/* Data de nascimento */}
        <div><p className={roLabel}>Data de Nascimento</p>
          {editing
            ? <input className={inp+" mt-1"} type="date" value={dataNasc} onChange={e=>setNasc(e.target.value)} />

        {/* Somente leitura */}
        <div><p className={roLabel}>E-mail</p><p className={roVal}>{user.email}</p></div>

          <span className="text-red-300">›</span>
        </button>
      </div>

      {showSenha && <AlterarSenhaModal user={user} onClose={()=>setShowS(false)} onSaved={onUpdate} />}
      {showExc   && <ExcluirContaModal user={user} onClose={()=>setShowExc(false)} onDeleted={onLogout} />}
    </div>
  );
};

// APP PRINCIPAL — gate de autenticação
// ══════════════════════════════════════════════════════════════
const App = () => {
  const [authState, setAuth] = useState('loading');
  const [user,  setUser]  = useState(null);
  const [motos, setMotos] = useState([]);
  const [concs, setConcs] = useState([]);
  const [page,  setPage]  = useState('vitrine');
  const [menu,  setMenu]  = useState(false);
  const [toast, setToast] = useState(null);

  // ── Inicialização: carrega tudo do localStorage ──────────────
  useEffect(() => {
    // Força atualização das contas demo (garante senha 123456 sempre)
    const stored = LS.getUsers();
    if (stored) {
      const merged = DEMO_ACCOUNTS.map(demo => {
        const existing = stored.find(u => u.id === demo.id);
        // mantém dados extras de usuários cadastrados manualmente
        return existing ? { ...existing, senha: demo.senha } : demo;
      });
      const novos = stored.filter(u => u.id > 4);
      LS.saveUsers([...merged, ...novos]);
    } else {
      LS.saveUsers(DEMO_ACCOUNTS);
    }
    setMotos(LS.getMotos() || MOTOS0);
    setConcs(LS.getConcs() || CONCS0);
    const sess = LS.getSession();
    // Restaura tema escuro se o usuário tinha preferência salva
    if (sess?.darkMode) document.body.classList.add('frenzzo-dark');
    // Splash mínimo de 2s para impacto da marca
    setTimeout(() => {
      if (sess) { setUser(sess); setAuth('app'); }
      else setAuth('login');
    }, 2000);
  }, []);

  // ── Auto-save: persiste sempre que motos ou concs mudam ──────
  useEffect(() => { if (motos.length) LS.saveMotos(motos); }, [motos]);
  useEffect(() => { if (concs.length) LS.saveConcs(concs); }, [concs]);

  const [googleData, setGoogleData] = useState(null);

  const notify     = (msg) => { setToast(msg); setTimeout(()=>setToast(null),3000); };
  const handleLogin    = (u) => { setUser(u); setAuth('app'); };
  const handleLogout   = () => { LS.clearSession(); setUser(null); setAuth('login'); setPage('vitrine'); };
  const goRegisterGoogle = (data) => { setGoogleData(data); setAuth('register'); };
  const handleUserUpdate = (updated) => { setUser(updated); };
  const onCadastrar    = (m) => { setMotos(p=>[...p,m]); setPage('vitrine'); notify('Moto cadastrada com sucesso!'); };
  const onAvancar      = (id,comp) => { setMotos(p=>p.map(m=>m.id===id?{...m,status:'em_negociacao',vendId:user.id,vend:user.nome,comprador:comp}:m)); notify('Interesse registrado!'); };
  const onConcluir     = (id) => { setMotos(p=>p.map(m=>m.id===id?{...m,status:'concluido'}:m)); notify('Negociação concluída! Comissões registradas.'); };

  if (authState==='loading') return (
    <div className="fixed inset-0 flex items-center justify-center splash-out" style={{background:'#0a0a0a',zIndex:9999}}>
      <div className="text-center frenzzo-fade-up">
        <FrenzzoLogo size="xl" />
        <div className="mt-4 h-px bg-[#ff4500] mx-auto frenzzo-fade-in frenzzo-delay-1" style={{width:'120px'}} />
        <p className="mt-4 text-xs tracking-[0.3em] uppercase text-[#ff4500] font-medium frenzzo-fade-in frenzzo-delay-2">
          Sua moto. Seu preço. Sem complicação.
        </p>
      </div>
    </div>
  );
  if (authState==='login')    return <LoginPage onLogin={handleLogin} onGoRegister={()=>{setGoogleData(null);setAuth('register');}} onGoRegisterGoogle={goRegisterGoogle} />;
  if (authState==='register') return <RegisterPage onBack={()=>{setGoogleData(null);setAuth('login');}} onRegistered={handleLogin} googleData={googleData} />;
  // Feature 6: força troca de senha se admin resetou
  if (user?.mustChangePassword) return <TrocaSenhaObrigatoria user={user} onDone={handleUserUpdate} />;

  const NAV = [
    {k:'vitrine',        l:'Vitrine',      i:'🏍️', roles:['super_admin','gerente','vendedor']},
    {k:'cadastro',       l:'Cadastrar',    i:'➕', roles:['vendedor']},
    {k:'negociacoes',    l:'Negociações',  i:'📋', roles:['super_admin','gerente','vendedor']},
    {k:'comissoes',      l:'Comissões',    i:'💰', roles:['super_admin','gerente','vendedor']},
    {k:'relatorio',      l:'Relatório',    i:'📊', roles:['super_admin','gerente']},
    {k:'concessionarias',l:'Parceiros',    i:'🏢', roles:['super_admin']},
  ].filter(n=>n.roles.includes(user.perfil));

  return (
    <div className="min-h-screen bg-slate-50">
      <header className="sticky top-0 z-30 shadow-xl" style={{background:'#0a0a0a'}}>
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
          <div className="flex items-center flex-shrink-0">
            <FrenzzoLogo size="sm" />
          </div>
          <nav className="hidden md:flex gap-1 flex-1 justify-center">
            {NAV.map(n=>(
              <button key={n.k} onClick={()=>setPage(n.k)}
                className={`px-3 py-2 rounded-xl text-sm font-medium transition-colors ${page===n.k?'bg-[#ff4500] text-white':'text-blue-200 hover:bg-white/10'}`}>
                {n.i} {n.l}
              </button>
            ))}
          </nav>
          <div className="relative">
            <button onClick={()=>setMenu(!menu)} className="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-3 py-2 rounded-xl text-sm transition-colors">
              <div className="w-7 h-7 rounded-full overflow-hidden bg-[#ff4500] flex items-center justify-center text-white font-bold text-xs flex-shrink-0">
                {user.foto ? <img src={user.foto} className="w-full h-full object-cover" alt="" /> : user.nome[0]}
              </div>
              <div className="hidden sm:block text-left"><p className="text-white text-xs font-semibold leading-none">{user.nome}</p><p className="text-blue-300 text-xs">{PERFIL[user.perfil]}</p></div>
              <span className="text-blue-300 text-xs">▾</span>
            </button>
            {menu && (
              <div className="absolute right-0 top-full mt-2 bg-white rounded-2xl shadow-2xl border border-slate-100 py-2 w-56 z-50">
                <div className="px-4 py-3 border-b border-slate-100 flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full overflow-hidden bg-[#ff4500] flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
                    {user.foto ? <img src={user.foto} className="w-full h-full object-cover" alt="" /> : user.nome[0]}
                  </div>
                  <div><p className="font-bold text-gray-800 text-sm">{user.nome}</p>
                    <p className="text-gray-400 text-xs">{user.email}</p></div>
                </div>
                {[['👤','Meu Perfil','perfil'],['⚙️','Configurações','config']].map(([ic,lb,pg])=>(
                  <button key={pg} onClick={()=>{setPage(pg);setMenu(false);}}
                    className="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-slate-50 flex items-center gap-3">
                    <span>{ic}</span>{lb}
                  </button>
                ))}
                <div className="border-t border-slate-100 mt-1 pt-1">
                  <button onClick={handleLogout} className="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 flex items-center gap-3">
                    <span>↩</span>Sair
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
        <div className="md:hidden border-t border-white/10 px-3 py-2 flex gap-1 overflow-x-auto">
          {NAV.map(n=>(
            <button key={n.k} onClick={()=>setPage(n.k)}
              className={`flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium ${page===n.k?'bg-[#ff4500] text-white':'text-blue-200 hover:bg-white/10'}`}>
              {n.i} {n.l}
            </button>
          ))}
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6" onClick={()=>menu&&setMenu(false)}>
        {page==='vitrine'         && <Vitrine        motos={motos} user={user} onAvancar={onAvancar} onConcluir={onConcluir} />}
        {page==='cadastro'        && <Cadastro        user={user} onSave={onCadastrar} />}
        {page==='negociacoes'     && <Negociacoes     motos={motos} />}
        {page==='comissoes'       && <Comissoes       motos={motos} user={user} />}
        {page==='relatorio'       && <Relatorio       motos={motos} user={user} />}
        {page==='concessionarias' && <Concessionarias concs={concs} motos={motos} users={LS.getUsers()||[]}
            onToggle={id=>setConcs(p=>p.map(c=>c.id===id?{...c,ativa:!c.ativa}:c))}
            onUpdateConcs={newConcs=>setConcs(newConcs)} />}
        {page==='perfil'          && <PerfilPage      user={user} onUpdate={handleUserUpdate} onLogout={handleLogout} />}
        {page==='config'          && <ConfigPage      user={user} onUpdate={handleUserUpdate} />}
      </main>

      {toast && (
        <div className="fixed bottom-5 right-5 bg-emerald-600 text-white px-5 py-3 rounded-2xl shadow-2xl text-sm font-semibold z-50">
          ✓ {toast}
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Registro do Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[FRENZZO SW] registrado:', reg.scope))
        .catch(err => console.warn('[FRENZZO SW] falha:', err));
    });
  }
</script>
</body>
</html>
